<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Her ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(to bottom,#08111f,#0f172a,#1e293b);
    color:white;
    font-family:'Caveat',cursive;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
    text-align:center;
    position:relative;
}

/* Animated stars */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
        radial-gradient(white 1px, transparent 1px);
    background-size:40px 40px;
    opacity:.15;
    animation:stars 25s linear infinite;
}

@keyframes stars{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-100px);
    }
}

/* Floating hearts */
.heart{
    position:absolute;
    font-size:22px;
    opacity:.3;
    animation:floatUp 12s linear infinite;
    pointer-events:none;
}

@keyframes floatUp{
    from{
        transform:translateY(110vh);
        opacity:0;
    }

    20%{
        opacity:.35;
    }

    to{
        transform:translateY(-120px);
        opacity:0;
    }
}

#text{
    width:90%;
    max-width:900px;
    font-size:clamp(2.2rem,5vw,3.5rem);
    line-height:1.3;
    z-index:5;
    transition:all .6s ease;
    text-shadow:0 0 12px rgba(255,255,255,.12);
    padding:20px;
}

button{
    padding:14px 36px;
    font-size:1.8rem;
    border:none;
    border-radius:50px;
    cursor:pointer;
    background:#ff4d6d;
    color:white;
    display:none;
    margin-top:20px;
    font-family:'Caveat',cursive;
    box-shadow:0 0 20px rgba(255,77,109,.5);
    z-index:5;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}
</style>
</head>
<body>

<div class="heart" style="left:8%;animation-delay:0s;">❤️</div>
<div class="heart" style="left:20%;animation-delay:3s;">❤️</div>
<div class="heart" style="left:35%;animation-delay:5s;">❤️</div>
<div class="heart" style="left:50%;animation-delay:1s;">❤️</div>
<div class="heart" style="left:65%;animation-delay:4s;">❤️</div>
<div class="heart" style="left:80%;animation-delay:2s;">❤️</div>
<div class="heart" style="left:92%;animation-delay:6s;">❤️</div>

<div id="text"></div>

<button id="yesBtn">❤️ Yes ❤️</button>

<script>

const lines = [
"Hey Bestiee...",
"I wanna tell u something.",
"It started with a conversation.",
"Just a normal one.",
"But somehow...",
"Talking to you became my favorite part of the day.",
"The good days became better.",
"The bad days felt easier.",
"And without realizing it...",
"You became my favorite notification.",
"❤️",
"Then I learned something about swans.",
"🦢 🦢",
"They usually travel in pairs.",
"They stay beside the one they choose.",
"Through calm waters.",
"Through rough waters.",
"And maybe...",
"That's what made me think of you.",
"So...",
"I was wondering...",
"If one day...",
"You'd choose to stay beside me too.",
"❤️",
"Will You Be My Swan? 🦢❤️"
];

let i = 0;
const text = document.getElementById("text");

function showText(){

    if(i < lines.length){

        text.style.opacity = 0;

        setTimeout(() => {

            text.innerHTML = lines[i];

            if(lines[i].includes("Will You Be My Swan")){
                text.style.fontSize = "clamp(3rem,8vw,5rem)";
                text.style.color = "#ffd6e0";
            }else{
                text.style.fontSize = "clamp(2.2rem,5vw,3.5rem)";
                text.style.color = "white";
            }

            text.style.opacity = 1;
            i++;

        }, 500);

        setTimeout(showText, 3400);

    }else{

        document.getElementById("yesBtn").style.display = "inline-block";

    }
}

showText();

document.getElementById("yesBtn").onclick = () => {

document.body.innerHTML = `
<div style="
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
font-family:'Caveat',cursive;
background:linear-gradient(to bottom,#08111f,#0f172a,#1e293b);
color:white;
text-align:center;
">

<div style="font-size:5rem;">❤️</div>

<div style="
font-size:clamp(3rem,8vw,6rem);
text-shadow:0 0 25px pink;
margin-top:10px;
">
YAYYYYY 😭❤️
</div>

<div style="
font-size:clamp(2rem,5vw,3rem);
margin-top:20px;
">
You are officially my Swan 🦢❤️
</div>

</div>
`;

};

</script>

</body>
</html>
